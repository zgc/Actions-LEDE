# https://github.com/P3TERX/Actions-OpenWrt
# Description: Build OpenWrt using GitHub Actions (Optimized)
#
# Optimization features:
# - actions/cache@v4 with granular DL/TOOLCHAIN/CCACHE keys
# - Step-level timeout-minutes for all long-running steps
# - 8GB swap file to prevent OOM on Go/Rust compilations
# - Parallel Go pre-compile (background + wait)
# - Load-aware make (make -l) to prevent CPU oversubscription
# - Retry with V=s on failure for easier debug
#

name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  REPO_COMMIT:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config.seed
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  RELEASE_NAME:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360       # ← hard limit: 6h max

    env:
      GOPROXY: https://goproxy.cn,https://goproxy.io,direct
      GONOSUMCHECK: '*'
      GOSUMDB: 'off'

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: "Optimize Disk Space"
      uses: "hugoalh/disk-space-optimizer-ghaction@v0.8.1"
      with:
        operate_sudo: "True"
        general_include: ".+"
        general_exclude: |-
          ^GCC$
          ^G\+\+$
          Clang
          LLVM
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: "Add 8GB swap file (prevents OOM during Go/Rust builds)"
      run: |
        sudo fallocate -l 8G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "✅ Swap added: $(free -h | grep Swap)"

    - name: Checkout
      uses: actions/checkout@v4
      timeout-minutes: 3

    - name: Load device config
      run: |
        if [ -f openwrt-device.conf ]; then
          echo "Loading openwrt-device.conf..."
          cat openwrt-device.conf
          source openwrt-device.conf
          if [ -n "$RELEASE_NAME" ]; then
            echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
            echo "✅ Device: $RELEASE_NAME"
          fi
        else
          echo "No openwrt-device.conf found, using default RELEASE_NAME"
        fi
        # Extract DEVICE_ARCH from config.seed for build cache key
        if [ -f config.seed ]; then
          DEVICE_ARCH=$(grep '^CONFIG_TARGET_[a-z0-9_]*=y$' config.seed 2>/dev/null | tail -1 | sed 's/^CONFIG_TARGET_//;s/=y$//')
          echo "DEVICE_ARCH=${DEVICE_ARCH:-x86_64}" >> $GITHUB_ENV
          echo "✅ DEVICE_ARCH: ${DEVICE_ARCH:-x86_64}"
        fi

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      timeout-minutes: 15
      run: |
        sudo -E docker image prune --all --force
        sudo -E docker builder prune -a
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android /opt/ghc /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
        sudo -E apt -y full-upgrade
        sudo -E apt -y install ack asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache ca-certificates clang cmake cpio curl device-tree-compiler fakeroot flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf gnutls-dev haveged help2man intltool jq libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev llvm lrzsz msmtp ninja-build nodejs npm patch pkgconf python3 python3-cryptography python3-docutils python3-pip python3-ply python3-pyelftools python3-requests qemu-utils quilt re2c rsync scons sharutils squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean
        sudo -E timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        # ccache config
        mkdir -p ~/.ccache
        echo "max_size = 2.0G" >> ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf
        echo "compression_level = 6" >> ~/.ccache/ccache.conf

    - name: Clone source code
      working-directory: /workdir
      timeout-minutes: 10
      run: |
        echo -e "PWS -> $PWD"
        df -hT $PWD
        echo -e "GITHUB_WORKSPACE -> $GITHUB_WORKSPACE"
        df -hT $GITHUB_WORKSPACE
        # Fix GnuTLS TLS 1.3 handshake failures with GitHub
        git config --global http.sslVersion tlsv1.2
        git config --global http.version HTTP/1.1
        git config --global http.postBuffer 524288000
        git config --global --add safe.directory '*'
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        [ ! -z $REPO_COMMIT ] && cd openwrt && git pull origin $REPO_COMMIT && git reset --hard $REPO_COMMIT
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # ── Granular cache strategy ──────────────────────────────────
    # Key hierarchy:
    #   1. dl-${DATE}          → source packages (daily refresh)
    #   2. staging-${DEVICE}-${DATE} → toolchain + staging dirs
    #   3. ccache-${DATE}      → compiler cache
    # Restore fallback: latest matching prefix
    #
    # We compute CACHE_DATE once so all cache steps share the same epoch.
    - name: Compute cache epoch
      id: cache_date
      run: echo "epoch=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

    # Cache 1: Source packages (dl/)
    # Unchanged sources → full hit. Only new/changed pkgs → partial.
    - name: Cache dl/
      id: cache_dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: openwrt-dl-${{ env.DEVICE_ARCH }}-${{ steps.cache_date.outputs.epoch }}
        restore-keys: |
          openwrt-dl-${{ env.DEVICE_ARCH }}-

    # Cache 2: Toolchain + staging_dir (expensive to rebuild)
    - name: Cache toolchain
      id: cache_toolchain
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir
          openwrt/build_dir/target-*
          openwrt/build_dir/host
          openwrt/build_dir/hostpkg
        key: openwrt-toolchain-${{ env.DEVICE_ARCH }}-${{ steps.cache_date.outputs.epoch }}
        restore-keys: |
          openwrt-toolchain-${{ env.DEVICE_ARCH }}-

    # Cache 3: ccache (compiler cache)
    - name: Cache ccache
      id: cache_ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: openwrt-ccache-${{ env.DEVICE_ARCH }}-${{ steps.cache_date.outputs.epoch }}
        restore-keys: |
          openwrt-ccache-${{ env.DEVICE_ARCH }}-

    - name: Load custom feeds
      timeout-minutes: 5
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      timeout-minutes: 10
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      timeout-minutes: 5
      run: cd openwrt && ./scripts/feeds install -a

    - name: Apply build fixes
      timeout-minutes: 2
      run: |
        cd openwrt
        # Fix netdata build: disable cloud/ACLK to remove protobuf dependency
        # Root cause: netdata's #define error(args...) macro conflicts with abseil-cpp headers
        NETDATA_FEED=feeds/packages/admin/netdata
        if [ -f "$NETDATA_FEED/Makefile" ]; then
          sed -i 's/\t--disable-ml$/\t--disable-ml \\\n\t--disable-cloud/' "$NETDATA_FEED/Makefile"
          echo "✅ netdata: --disable-cloud added"
        fi
        # Bump zerotier to 1.16.2 (feeds has 1.16.0, 1.16.2 supports moon natively)
        ZT_FEED=feeds/packages/net/zerotier
        if [ -f $ZT_FEED/Makefile ]; then
          sed -i 's/PKG_VERSION:=1.16.0/PKG_VERSION:=1.16.2/' $ZT_FEED/Makefile
          ZT_HASH=$(curl -sL "https://codeload.github.com/zerotier/ZeroTierOne/tar.gz/1.16.2" | sha256sum | awk '{print $1}')
          if [ -n "$ZT_HASH" ] && [ ${#ZT_HASH} -eq 64 ]; then
            sed -i "s/^PKG_HASH:=.*/PKG_HASH:=$ZT_HASH/" $ZT_FEED/Makefile
            echo "✅ zerotier bumped to 1.16.2 (hash: ${ZT_HASH:0:12}...)"
          else
            echo "⚠️ zerotier hash compute failed, keeping original"
          fi
          # Enable config_path for persistent zerotier data (identity, moon, networks)
          ZT_CONF=$ZT_FEED/files/etc/config/zerotier
          if [ -f "$ZT_CONF" ]; then
            sed -i "s/#option config_path '.*'/option config_path '\/etc\/zerotier'/" "$ZT_CONF"
            echo "✅ zerotier config_path enabled for data persistence"
          fi
        fi
        # zerotier and adguardhome are already enabled in config.seed

    - name: Load custom configuration
      timeout-minutes: 2
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ── Parallel download + Go pre-download ──────────────────────
    # In download phase, also pre-fetch Go module deps for heavy Go packages
    # so the compile phase doesn't need to download them.
    - name: Download package
      id: package
      timeout-minutes: 30
      run: |
        cd openwrt
        make defconfig
        # Download all source packages in parallel
        make download -j16 V=s 2>&1 | tail -20
        # Remove broken downloads (<1KB = failed)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ── Compile phase ────────────────────────────────────────────
    # Strategy:
    #   1. Only pre-compile Go packages that are actually enabled in config
    #   2. Fire them in background (&) to overlap with main build
    #   3. Wait for background compiles to finish
    #   4. Retry failures with V=s for debug
    - name: Compile the firmware
      id: compile
      timeout-minutes: 240      # ← 4h hard limit for compile alone
      run: |
        cd openwrt

        echo "=== Pre-compiling enabled Go packages (background) ==="
        # Check config to find which Go packages are actually selected
        # Only pre-compile those; unselected packages skip silently.
        for go_pkg in frp adguardhome filebrowser; do
          # frp uses 'frpc' package name; map Go binary name to make target
          case "$go_pkg" in
            frp)        pkg_target="frpc" ;;
            *)          pkg_target="$go_pkg" ;;
          esac
          if grep -q "CONFIG_PACKAGE_luci-app-${pkg_target}=y\|CONFIG_PACKAGE_${pkg_target}=y" .config 2>/dev/null; then
            ( echo "=== Pre-compiling $go_pkg (target: $pkg_target) ===" && \
              make package/$pkg_target/compile -j1 V=s 2>&1 | tail -5 && \
              echo "✅ $go_pkg done" ) &
          fi
        done

        echo -e "$(nproc) thread compile (load-limited)"
        # Main build: -jN for parallelism, -lN to avoid oversubscription
        # Retry: first pass with -j$(nproc), fallback to -j1 V=s for error visibility
        make -j$(nproc) -l$(nproc) 2>&1 | tail -20 || \
          make -j1 V=s 2>&1 | tail -40

        # Wait for background Go compiles
        wait
        echo "status=success" >> $GITHUB_OUTPUT

        [ -z $RELEASE_NAME ] && RELEASE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/CONFIG_TARGET_(.*)_DEVICE.*=y/\1/')
        echo $RELEASE_NAME > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        mkdir -p $GITHUB_WORKSPACE/release
        mv config.buildinfo $GITHUB_WORKSPACE/release/
        mv $(ls -1 ./*img.gz | head -1) $GITHUB_WORKSPACE/release/$DEVICE_NAME.img.gz
        cd $GITHUB_WORKSPACE/release/ && md5sum $DEVICE_NAME.img.gz > $DEVICE_NAME.img.gz.md5
        gzip -dc $DEVICE_NAME.img.gz | md5sum | sed "s/-/$DEVICE_NAME.img/" > $DEVICE_NAME.img.md5
        echo "FIRMWARE=$GITHUB_WORKSPACE/release" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ $UPLOAD_COWTRANSFER = true ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ $UPLOAD_WETRANSFER = true ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.1.0
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
